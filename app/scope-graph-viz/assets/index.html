<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scope Graph Viz</title>
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<main class="app">
  <section class="editor-pane">
    <div class="toolbar">
      <span class="brand">scope-graph-viz</span>
      <span id="status">ready</span>
    </div>
    <textarea id="source" spellcheck="false">{{SOURCE}}</textarea>
  </section>
  <section class="result-pane" id="result">
    <div class="summary"><span class="badge neutral">loading</span></div>
  </section>
</main>
<script src="/assets/app.js"></script>
</body>
</html>
