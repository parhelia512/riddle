name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 校验标签与 Cargo 版本
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [ "${{ github.ref_name }}" != "v${VERSION}" ]; then
            echo "标签 ${{ github.ref_name }} 与 Cargo 版本 ${VERSION} 不匹配"
            exit 1
          fi

  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
            platform: linux

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64
            platform: linux

          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            arch: i686
            platform: linux
            cross: true

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
            platform: windows

          - os: windows-latest
            target: i686-pc-windows-msvc
            arch: i686
            platform: windows
            cross: true

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: aarch64
            platform: windows
            cross: true

          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译依赖（Linux i686）
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: 运行测试（仅原生目标）
        if: matrix.cross != true
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Release 构建
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: 打包平台构建产物
        shell: bash
        run: |
          SUFFIX="${{ matrix.platform }}-${{ matrix.arch }}"
          BIN_DIR="target/${{ matrix.target }}/release"

          mkdir -p dist

          for name in clue riddle-lsp riddlec; do
            if [ -f "$BIN_DIR/$name" ]; then
              cp "$BIN_DIR/$name" "dist/$name"
            elif [ -f "$BIN_DIR/$name.exe" ]; then
              cp "$BIN_DIR/$name.exe" "dist/$name.exe"
            else
              echo "Missing binary: $name"
              exit 1
            fi
          done

          cp LICENSE README.md dist/

          ZIPNAME="riddle-${{ github.ref_name }}-${SUFFIX}.zip"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            powershell -Command "Compress-Archive -Path dist\* -DestinationPath ${ZIPNAME}"
          else
            cd dist && zip "../${ZIPNAME}" * && cd ..
          fi
          ls -lh "${ZIPNAME}"

      - name: 上传 zip
        uses: actions/upload-artifact@v4
        with:
          name: release-zip-${{ matrix.platform }}-${{ matrix.arch }}
          path: riddle-*.zip

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载全部平台 zip
        uses: actions/download-artifact@v4
        with:
          pattern: release-zip-*
          path: .
          merge-multiple: true

      - name: 创建正式 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" riddle-*.zip \
            --title "Riddle ${{ github.ref_name }}" \
            --generate-notes

  notify:
    name: 通知失败
    needs: [validate, build, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "正式发布失败！请检查运行日志："
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
