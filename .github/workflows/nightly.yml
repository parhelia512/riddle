name: Nightly Build

on:
  schedule:
    # 每天 UTC 2:00 运行（北京时间约 10:00）
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "强制重新构建（即使没有新提交）"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── 检查是否有新提交 ──────────────────────────────────────────
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 对比上次夜间构建的提交
        id: check
        run: |
          CURRENT=$(git rev-parse HEAD)

          # 强制构建（手动触发且勾选了 force）
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.force }}" = "true" ]; then
            echo "强制重新构建"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 获取上次 nightly tag 指向的提交
          NIGHTLY=$(git rev-parse nightly^{} 2>/dev/null || echo "")

          echo "当前提交:   $CURRENT"
          echo "上次构建:   ${NIGHTLY:-无}"

          if [ "$CURRENT" = "$NIGHTLY" ]; then
            echo "无新提交，跳过本次构建"
            echo "should-build=false" >> "$GITHUB_OUTPUT"
          else
            echo "检测到新提交，开始构建"
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 矩阵构建 + 测试 ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    needs: check-changes
    if: needs.check-changes.outputs.should-build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            arch: x86_64
            platform: linux

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: aarch64
            platform: linux

          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            arch: i686
            platform: linux
            cross: true

          # ── Windows ────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
            platform: windows

          - os: windows-latest
            target: i686-pc-windows-msvc
            arch: i686
            platform: windows
            cross: true

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: aarch64
            platform: windows
            cross: true

          # ── macOS ──────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            arch: aarch64
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译依赖（Linux i686）
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly-${{ matrix.target }}

      - name: 运行测试（仅原生目标）
        if: matrix.cross != true
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Release 构建
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: 打包平台构建产物
        shell: bash
        run: |
          HASH=$(git rev-parse --short HEAD)
          SUFFIX="${{ matrix.platform }}-${{ matrix.arch }}"
          BIN_DIR="target/${{ matrix.target }}/release"

          mkdir -p dist

          for name in clue riddle-lsp riddlec; do
            if [ -f "$BIN_DIR/$name" ]; then
              cp "$BIN_DIR/$name" "dist/${name}-${SUFFIX}"
            fi
            if [ -f "$BIN_DIR/$name.exe" ]; then
              cp "$BIN_DIR/$name.exe" "dist/${name}-${SUFFIX}.exe"
            fi
          done

          ZIPNAME="riddle-${HASH}-nightly-${SUFFIX}.zip"
          if [ "${{ matrix.platform }}" = "windows" ]; then
            powershell -Command "Compress-Archive -Path dist\* -DestinationPath ${ZIPNAME}"
          else
            cd dist && zip "../${ZIPNAME}" * && cd ..
          fi
          ls -lh "${ZIPNAME}"

      - name: 上传 zip
        uses: actions/upload-artifact@v4
        with:
          name: nightly-zip-${{ matrix.platform }}-${{ matrix.arch }}
          path: riddle-*.zip

  # ── 发布 Nightly Release ─────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载全部平台 zip
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-zip-*
          path: .
          merge-multiple: true

      - name: 更新 nightly tag 并推送
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly HEAD
          git push -f origin nightly

      - name: 删除旧的 Release（保留 tag）
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete nightly --yes 2>/dev/null || true

      - name: 创建新的 Nightly Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HASH=$(git rev-parse --short HEAD)
          URL="${{ github.server_url }}/${{ github.repository }}/releases/download/nightly"
          gh release create nightly riddle-*.zip \
            --title "Nightly Build $(date +'%Y-%m-%d')" \
            --prerelease \
            --notes "$(cat <<EOF
          ### 自动化夜间构建

          - **提交**: [$(git rev-parse --short HEAD)](${{ github.server_url }}/${{ github.repository }}/commit/$(git rev-parse HEAD))
          - **运行日志**: [Actions #${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          #### 下载

          | 平台 | 架构 | 文件 |
          |------|------|------|
          | Linux   | x86_64   | [riddle-${HASH}-nightly-linux-x86_64.zip]($URL/riddle-${HASH}-nightly-linux-x86_64.zip) |
          | Linux   | aarch64  | [riddle-${HASH}-nightly-linux-aarch64.zip]($URL/riddle-${HASH}-nightly-linux-aarch64.zip) |
          | Linux   | i686     | [riddle-${HASH}-nightly-linux-i686.zip]($URL/riddle-${HASH}-nightly-linux-i686.zip) |
          | Windows | x86_64   | [riddle-${HASH}-nightly-windows-x86_64.zip]($URL/riddle-${HASH}-nightly-windows-x86_64.zip) |
          | Windows | i686     | [riddle-${HASH}-nightly-windows-i686.zip]($URL/riddle-${HASH}-nightly-windows-i686.zip) |
          | Windows | aarch64  | [riddle-${HASH}-nightly-windows-aarch64.zip]($URL/riddle-${HASH}-nightly-windows-aarch64.zip) |
          | macOS   | aarch64  | [riddle-${HASH}-nightly-macos-aarch64.zip]($URL/riddle-${HASH}-nightly-macos-aarch64.zip) |

          EOF
          )"

  # ── 失败通知 ─────────────────────────────────────────────────
  notify:
    name: 通知失败
    needs: [check-changes, build, release]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "夜间构建失败！请检查运行日志："
          echo "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
